version: '3.8'

services:
  db:
    image: postgres:15
    container_name: villa_db
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Removed ports to hide database from host machine access

  backend:
    build: ./Backend
    container_name: villa_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.docker
    volumes:
      - ./Backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./fronted_copy
    container_name: villa_frontend
    env_file:
      - .env.docker
    ports:
      - "5173:5173"
    volumes:
      - ./fronted_copy:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
